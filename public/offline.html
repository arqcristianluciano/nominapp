<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="robots" content="noindex" />
    <title>Sin conexion - NominaAPP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
        background: linear-gradient(160deg, #0f172a 0%, #1e293b 60%, #1e40af 100%);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 1rem;
        padding: 2.25rem 1.75rem;
        text-align: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 20px 45px -20px rgba(0, 0, 0, 0.6);
      }
      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        border-radius: 999px;
        background: rgba(30, 64, 175, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #93c5fd;
      }
      .icon svg {
        width: 2rem;
        height: 2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1.75rem;
        color: #cbd5f5;
        line-height: 1.55;
        font-size: 0.975rem;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        font-size: 1rem;
        padding: 0.75rem 1.5rem;
        border-radius: 0.625rem;
        background: #2563eb;
        color: #fff;
        transition:
          background-color 150ms ease,
          transform 150ms ease;
        min-width: 12rem;
      }
      button:hover,
      button:focus-visible {
        background: #1d4ed8;
        outline: none;
      }
      button:active {
        transform: scale(0.98);
      }
      .status {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #94a3b8;
        min-height: 1.25rem;
      }
      .status.online {
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <div class="icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M2 8.82a15 15 0 0 1 20 0" />
          <path d="M5 12.86a10 10 0 0 1 14 0" />
          <path d="M8.5 16.43a5 5 0 0 1 7 0" />
          <line x1="12" y1="20" x2="12" y2="20" />
          <line x1="2" y1="2" x2="22" y2="22" />
        </svg>
      </div>
      <h1>Sin conexion</h1>
      <p>
        No pudimos conectar con NominaAPP. Revisa tu conexion a internet y vuelve a intentarlo.
      </p>
      <button type="button" id="retry-btn">Reintentar</button>
      <div class="status" id="status" aria-live="polite"></div>
    </main>
    <script>
      (function () {
        var btn = document.getElementById('retry-btn')
        var status = document.getElementById('status')

        function setStatus(text, online) {
          status.textContent = text || ''
          status.classList.toggle('online', !!online)
        }

        function retry() {
          if (navigator.onLine) {
            setStatus('Conectado. Recargando...', true)
            window.location.reload()
          } else {
            setStatus('Aun sin conexion. Intentalo de nuevo en unos segundos.', false)
          }
        }

        btn.addEventListener('click', retry)

        window.addEventListener('online', function () {
          setStatus('Conexion restablecida. Recargando...', true)
          window.location.reload()
        })

        window.addEventListener('offline', function () {
          setStatus('Sin conexion.', false)
        })

        if (!navigator.onLine) {
          setStatus('Sin conexion.', false)
        }
      })()
    </script>
  </body>
</html>
