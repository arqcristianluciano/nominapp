<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NominaAPP" />
    <meta name="description" content="Gestión integral de obras de construcción" />
    <title>NominaAPP</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('nominaapp-theme')
          var t = 'light'
          if (raw) {
            var p = JSON.parse(raw)
            var stored = p.state && p.state.theme
            if (stored === 'dark' || stored === 'light') t = stored
          }
          if (t === 'dark') {
            document.documentElement.classList.add('dark')
            document.documentElement.style.colorScheme = 'dark'
            document.documentElement.style.backgroundColor = '#0a0f1a'
          } else {
            document.documentElement.style.colorScheme = 'light'
            document.documentElement.style.backgroundColor = '#f1f5f9'
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
