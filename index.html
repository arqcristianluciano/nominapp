<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <!-- TODO: agregar apple-touch-icon.png en public/ -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> -->
    <link rel="mask-icon" href="/favicon.svg" color="#1e40af" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1e40af" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="NominaAPP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NominApp" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Gestión integral de obras de construcción: nóminas, finanzas, cubicaciones y más." />
    <title>NominaAPP</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('nominaapp-theme')
          var t = 'light'
          if (raw) {
            var p = JSON.parse(raw)
            var stored = p.state && p.state.theme
            if (stored === 'dark' || stored === 'light') t = stored
          }
          if (t === 'dark') {
            document.documentElement.classList.add('dark')
            document.documentElement.style.colorScheme = 'dark'
            document.documentElement.style.backgroundColor = '#0a0f1a'
          } else {
            document.documentElement.style.colorScheme = 'light'
            document.documentElement.style.backgroundColor = '#f1f5f9'
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
